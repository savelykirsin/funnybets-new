<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FunnyBets MVP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            color: #333;
            overflow: hidden; /* Для эффекта свайпа */
        }
        .video-container {
            width: 360px; /* Ширина TikTok-экрана */
            height: 640px; /* Высота TikTok-экрана (9:16) */
            background-color: #000;
            border: 2px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }
        img, video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Скрываем по умолчанию */
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 1.1em;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 15px;
            font-size: 1.5em;
            font-weight: bold;
            color: #007bff;
        }
        #statusMessage {
            margin-top: 10px;
            font-size: 1.2em;
            color: #555;
            min-height: 1.2em; /* Чтобы текст не прыгал */
        }
        /* Анимация "свайпа" */
        @keyframes swipeUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-100%); opacity: 0; }
        }
        .swiping-up {
            animation: swipeUp 0.5s forwards;
        }
    </style>
</head>
<body>
    <h1>FunnyBets MVP - Лента</h1>

    <div id="statusMessage">Ожидание...</div>

    <div class="video-container" id="videoContainer">
        <img id="previewImage" src="" alt="Video Preview">
        <video id="videoPlayer" src="" autoplay muted loop playsinline></video>
    </div>

    <div class="controls">
        <button id="betHitButton" data-outcome="hit">🎯 Попал</button>
        <button id="betMissButton" data-outcome="miss">❌ Промахнулся</button>
        <button id="betRimTouchButton" data-outcome="rim_touch">🔥 Касание обода</button>
        <button id="nextRoundButton" style="display: none;">Новый раунд</button> <!-- Кнопка "Новый раунд" пока скрыта -->
    </div>

    <div id="result"></div>

    <script>
        const videoContainer = document.getElementById('videoContainer');
        const videoPlayer = document.getElementById('videoPlayer');
        const previewImage = document.getElementById('previewImage');
        const nextRoundButton = document.getElementById('nextRoundButton');
        const resultDisplay = document.getElementById('result');
        const statusMessage = document.getElementById('statusMessage');

        const betHitButton = document.getElementById('betHitButton');
        const betMissButton = document.getElementById('betMissButton');
        const betRimTouchButton = document.getElementById('betRimTouchButton');

        let currentOutcome = '';
        let pollingInterval = null; // Для хранения интервала опроса
        let currentPredictionId = null; // Новый
        let userSelectedOutcome = null; // Новый

        async function fetchNewRound() {
            if (pollingInterval) { // Очищаем предыдущий интервал, если есть
                clearInterval(pollingInterval);
                pollingInterval = null;
            }

            // Добавляем анимацию "свайпа"
            videoContainer.classList.add('swiping-up');
            // Ждем завершения анимации, затем сбрасываем состояние и начинаем новый раунд
            setTimeout(async () => {
                videoContainer.classList.remove('swiping-up');
                betHitButton.disabled = true;
                betMissButton.disabled = true;
                betRimTouchButton.disabled = true;
                nextRoundButton.style.display = 'none'; // Скрыть кнопку "Новый раунд"
                statusMessage.textContent = 'Подготовка к новому раунду...';
                resultDisplay.textContent = '';
                videoPlayer.src = '';
                videoPlayer.style.display = 'none';
                previewImage.src = '';
                previewImage.style.display = 'none';

                videoPlayer.load();

                try {
                    // Шаг 1: Запускаем генерацию видео
                    statusMessage.textContent = 'Запуск генерации...';
                    const startResponse = await fetch('http://localhost:3000/api/start-video-generation');
                    const startData = await startResponse.json();

                    if (startResponse.status !== 200) {
                        throw new Error(startData.details || 'Failed to start video generation.');
                    }

                                        currentPredictionId = startData.predictionId; // Сохраняем ID предсказания
                    console.log('ID предсказания:', startData.predictionId);
                    console.log('URL превью:', startData.imageUrl);

                    // Показываем превью
                    previewImage.src = startData.imageUrl;
                                        previewImage.style.display = 'block';
                    statusMessage.textContent = 'Сделайте вашу ставку!';
                    betHitButton.disabled = false;
                    betMissButton.disabled = false;
                    betRimTouchButton.disabled = false;

                    // Шаг 2: Начинаем опрос статуса
                    pollingInterval = setInterval(async () => {
                        const statusResponse = await fetch(`http://localhost:3000/api/check-video-status/${startData.predictionId}`);
                        const statusData = await statusResponse.json();

                        if (statusResponse.status !== 200) {
                             clearInterval(pollingInterval);
                             throw new Error(statusData.details || 'Failed to check video status.');
                        }

                        if (statusData.status === 'succeeded') {
                            clearInterval(pollingInterval); // Останавливаем опрос
                                                        statusMessage.textContent = 'Видео готово! Запускаем...';
                            console.log('Видео готово:', statusData.videoUrl);
                            currentOutcome = statusData.outcome; // Устанавливаем итоговый исход

                            // Скрываем превью, показываем видео
                            previewImage.style.display = 'none';
                            videoPlayer.src = statusData.videoUrl;
                            videoPlayer.style.display = 'block';
                            videoPlayer.play().then(() => {

                                if (userSelectedOutcome) {
                                    if (userSelectedOutcome === currentOutcome) {
                                        resultDisplay.textContent = `ВЕРНО! Вы угадали: ${currentOutcome}!`;
                                    } else {
                                        resultDisplay.textContent = `НЕВЕРНО! Вы выбрали ${userSelectedOutcome}, а было ${currentOutcome}!`;
                                    }
                                } else {
                                    resultDisplay.textContent = `Исход: ${currentOutcome}`; // Если ставку не сделали
                                }
                                nextRoundButton.style.display = 'block'; // Показываем кнопку "Новый раунд"
                                userSelectedOutcome = null; // Сброс ставки пользователя
                            }).catch(error => {
                                console.warn("Автовоспроизведение заблокировано браузером.", error);
                                statusMessage.textContent = 'Видео готово, но автовоспроизведение заблокировано. Кликните по видео!';

                                if (userSelectedOutcome) {
                                    if (userSelectedOutcome === currentOutcome) {
                                        resultDisplay.textContent = `ВЕРНО! Вы угадали: ${currentOutcome}!`;
                                    } else {
                                        resultDisplay.textContent = `НЕВЕРНО! Вы выбрали ${userSelectedOutcome}, а было ${currentOutcome}!`;
                                    }
                                } else {
                                    resultDisplay.textContent = `Исход: ${currentOutcome}`; // Если ставку не сделали
                                }
                                nextRoundButton.style.display = 'block'; // Показываем кнопку "Новый раунд"
                                userSelectedOutcome = null; // Сброс ставки пользователя
                            });

                        } else if (statusData.status === 'failed') {
                            clearInterval(pollingInterval);
                            throw new Error(statusData.error || 'Video generation failed.');
                        } else {
                            statusMessage.textContent = `Видео генерируется... Статус: ${statusData.status}`;
                        }
                    }, 5000); // Опрашиваем каждые 5 секунд

                } catch (error) {
                    console.error('Ошибка при получении данных раунда:', error);
                    resultDisplay.textContent = 'Ошибка загрузки раунда.';
                    statusMessage.textContent = 'Произошла ошибка.';
                }
            }, 500); // Задержка для завершения анимации свайпа
        }

        // Запускаем первый раунд при загрузке страницы
        window.addEventListener('load', fetchNewRound);
        // Привязываем функцию к кнопке
        nextRoundButton.addEventListener('click', fetchNewRound);

        async function placeBet(outcome) {
            if (!currentPredictionId) {
                alert('Сначала дождитесь запуска раунда');
                return;
            }
            userSelectedOutcome = outcome; // Сохраняем ставку пользователя

            // Отправляем ставку на сервер (это просто для демонстрации, бэкенд ее просто сохранит)
            try {
                const response = await fetch('http://localhost:3000/api/place-bet', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ selectedOutcome: userSelectedOutcome, predictionId: currentPredictionId })
                });
                const data = await response.json();
                console.log('Ставка отправлена:', data.message);
                statusMessage.textContent = `Ваша ставка: ${userSelectedOutcome}. Ожидаем результат...`;
                // Отключаем кнопки после ставки
                betHitButton.disabled = true;
                betMissButton.disabled = true;
                betRimTouchButton.disabled = true;
            } catch (error) {
                console.error('Ошибка при отправке ставки:', error);
                alert('Ошибка при отправке ставки.');
            }
        }

        betHitButton.addEventListener('click', () => placeBet('hit'));
        betMissButton.addEventListener('click', () => placeBet('miss'));
        betRimTouchButton.addEventListener('click', () => placeBet('rim_touch'));
    </script>
</body>
</html>
